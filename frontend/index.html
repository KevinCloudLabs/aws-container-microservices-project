<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Operations Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
}

header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    font-size: 20px;
    color: #e6edf3;
    letter-spacing: 1px;
}

header span {
    font-size: 12px;
    color: #8b949e;
}

.tabs {
    display: flex;
    gap: 4px;
    padding: 20px 40px 0;
    border-bottom: 1px solid #30363d;
}

.tab {
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    font-size: 14px;
    color: #8b949e;
    border: 1px solid transparent;
    border-bottom: none;
    transition: 0.2s;
}

.tab:hover { color: #e6edf3; }

.tab.active {
    background: #161b22;
    color: #e6edf3;
    border-color: #30363d;
}

.content {
    padding: 30px 40px;
}

.panel { display: none; }
.panel.active { display: block; }

.summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
}

.card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
}

.card h3 {
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.card .value {
    font-size: 28px;
    font-weight: bold;
    color: #e6edf3;
}

.card .sub {
    font-size: 12px;
    color: #8b949e;
    margin-top: 4px;
}

.card.green .value { color: #3fb950; }
.card.red .value { color: #f85149; }
.card.yellow .value { color: #d29922; }
.card.blue .value { color: #58a6ff; }

table {
    width: 100%;
    border-collapse: collapse;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
}

th {
    background: #1c2128;
    padding: 12px 16px;
    text-align: left;
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #30363d;
}

td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid #21262d;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: #1c2128; }

.badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.badge.running { background: #1a3a2a; color: #3fb950; }
.badge.stopped { background: #3a1a1a; color: #f85149; }
.badge.available { background: #1a3a2a; color: #3fb950; }
.badge.ok { background: #1a3a2a; color: #3fb950; }
.badge.alarm { background: #3a1a1a; color: #f85149; }
.badge.insufficient { background: #2a2a1a; color: #d29922; }

.section-title {
    font-size: 16px;
    color: #e6edf3;
    margin-bottom: 16px;
    margin-top: 24px;
    padding-bottom: 8px;
    border-bottom: 1px solid #30363d;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #8b949e;
    font-size: 14px;
}

.error {
    background: #3a1a1a;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 16px;
    color: #f85149;
    font-size: 14px;
    margin-bottom: 20px;
}

.refresh-btn {
    background: #238636;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.refresh-btn:hover { background: #2ea043; }

.period {
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 16px;
}
</style>
</head>

<body>

<header>
    <h1>AWS Operations Dashboard</h1>
    <span id="last-updated">Loading...</span>
</header>

<div class="tabs">
    <div class="tab active" onclick="showTab('cost', event)">Cost</div>
    <div class="tab" onclick="showTab('resources', event)">Resources</div>
    <div class="tab" onclick="showTab('alerts', event)">Alerts</div>
</div>

<div class="content">

    <div id="cost-panel" class="panel active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:18px;">Cost Overview</h2>
            <button class="refresh-btn" onclick="loadCost()">Refresh</button>
        </div>
        <div id="cost-content"><div class="loading">Loading cost data...</div></div>
    </div>

    <div id="resources-panel" class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:18px;">Resource Inventory</h2>
            <button class="refresh-btn" onclick="loadResources()">Refresh</button>
        </div>
        <div id="resources-content"><div class="loading">Loading resource data...</div></div>
    </div>

    <div id="alerts-panel" class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:18px;">CloudWatch Alarms</h2>
            <button class="refresh-btn" onclick="loadAlerts()">Refresh</button>
        </div>
        <div id="alerts-content"><div class="loading">Loading alert data...</div></div>
    </div>

</div>

<script>
// API calls use relative paths — CloudFront routes /api/* to the ALB
// No CORS needed since frontend and API share the same domain (dashboard.kevinlutes.com)

function showTab(tab, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + '-panel').classList.add('active');
}

async function loadCost() {
    const el = document.getElementById('cost-content');
    el.innerHTML = '<div class="loading">Loading cost data...</div>';
    try {
        const res = await fetch('/api/cost/summary');
        const data = await res.json();

        let rows = data.breakdown.map(item => `
            <tr>
                <td>${item.service}</td>
                <td>$${item.cost.toFixed(2)}</td>
            </tr>
        `).join('');

        el.innerHTML = `
            <div class="summary-cards">
                <div class="card blue">
                    <h3>Total This Month</h3>
                    <div class="value">$${data.total.toFixed(2)}</div>
                    <div class="sub">${data.period}</div>
                </div>
                <div class="card">
                    <h3>Services with Spend</h3>
                    <div class="value">${data.breakdown.length}</div>
                    <div class="sub">across all AWS services</div>
                </div>
            </div>
            <p class="period">Period: ${data.period}</p>
            <table>
                <thead><tr><th>Service</th><th>Cost (USD)</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="2" style="text-align:center;color:#8b949e;">No spend data yet — Cost Explorer updates every 24 hours</td></tr>'}</tbody>
            </table>
        `;
    } catch (e) {
        el.innerHTML = `<div class="error">Error loading cost data: ${e.message}</div>`;
    }
}

async function loadResources() {
    const el = document.getElementById('resources-content');
    el.innerHTML = '<div class="loading">Loading resource data...</div>';
    try {
        const res = await fetch('/api/resources/summary');
        const data = await res.json();

        const ec2Rows = data.ec2_instances.map(i => `
            <tr>
                <td>${i.name}</td>
                <td>${i.id}</td>
                <td>${i.type}</td>
                <td><span class="badge ${i.state}">${i.state}</span></td>
                <td>${i.az}</td>
            </tr>
        `).join('');

        const rdsRows = data.rds_databases.map(d => `
            <tr>
                <td>${d.id}</td>
                <td>${d.engine}</td>
                <td>${d.class}</td>
                <td><span class="badge ${d.status}">${d.status}</span></td>
            </tr>
        `).join('');

        const s3Rows = data.s3_buckets.map(b => `
            <tr><td>${b.name}</td><td>${b.created}</td></tr>
        `).join('');

        el.innerHTML = `
            <div class="summary-cards">
                <div class="card blue">
                    <h3>EC2 Instances</h3>
                    <div class="value">${data.summary.ec2_count}</div>
                </div>
                <div class="card">
                    <h3>RDS Databases</h3>
                    <div class="value">${data.summary.rds_count}</div>
                </div>
                <div class="card">
                    <h3>S3 Buckets</h3>
                    <div class="value">${data.summary.s3_count}</div>
                </div>
            </div>

            <h3 class="section-title">EC2 Instances</h3>
            <table>
                <thead><tr><th>Name</th><th>Instance ID</th><th>Type</th><th>State</th><th>AZ</th></tr></thead>
                <tbody>${ec2Rows || '<tr><td colspan="5" style="text-align:center;color:#8b949e;">No instances found</td></tr>'}</tbody>
            </table>

            <h3 class="section-title">RDS Databases</h3>
            <table>
                <thead><tr><th>Identifier</th><th>Engine</th><th>Class</th><th>Status</th></tr></thead>
                <tbody>${rdsRows || '<tr><td colspan="4" style="text-align:center;color:#8b949e;">No databases found</td></tr>'}</tbody>
            </table>

            <h3 class="section-title">S3 Buckets</h3>
            <table>
                <thead><tr><th>Bucket Name</th><th>Created</th></tr></thead>
                <tbody>${s3Rows || '<tr><td colspan="2" style="text-align:center;color:#8b949e;">No buckets found</td></tr>'}</tbody>
            </table>
        `;
    } catch (e) {
        el.innerHTML = `<div class="error">Error loading resource data: ${e.message}</div>`;
    }
}

async function loadAlerts() {
    const el = document.getElementById('alerts-content');
    el.innerHTML = '<div class="loading">Loading alert data...</div>';
    try {
        const res = await fetch('/api/alerts/alarms');
        const data = await res.json();

        const rows = data.alarms.map(a => `
            <tr>
                <td>${a.name}</td>
                <td><span class="badge ${a.state.toLowerCase()}">${a.state}</span></td>
                <td>${a.metric}</td>
                <td>${a.description}</td>
                <td>${a.updated}</td>
            </tr>
        `).join('');

        el.innerHTML = `
            <div class="summary-cards">
                <div class="card ${data.in_alarm > 0 ? 'red' : 'green'}">
                    <h3>In Alarm</h3>
                    <div class="value">${data.in_alarm}</div>
                </div>
                <div class="card green">
                    <h3>OK</h3>
                    <div class="value">${data.ok}</div>
                </div>
                <div class="card yellow">
                    <h3>Insufficient Data</h3>
                    <div class="value">${data.insufficient_data}</div>
                </div>
                <div class="card">
                    <h3>Total Alarms</h3>
                    <div class="value">${data.total}</div>
                </div>
            </div>
            <table>
                <thead><tr><th>Alarm Name</th><th>State</th><th>Metric</th><th>Description</th><th>Last Updated</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:#8b949e;">No alarms configured</td></tr>'}</tbody>
            </table>
        `;
    } catch (e) {
        el.innerHTML = `<div class="error">Error loading alert data: ${e.message}</div>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    loadCost();
    loadResources();
    loadAlerts();
});
</script>

</body>
</html>
